<title>OLIVA Group — Apps</title>

<style>

:root{
--bg:#f5f3ef;
--text:#171717;
--muted:#6f6a63;
--line:rgba(0,0,0,0.08);
--shadow:0 18px 50px rgba(0,0,0,0.06);
--max:1180px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system;
background:linear-gradient(180deg,#faf9f7,#f5f3ef);
color:var(--text);
}

.container{
width:min(calc(100% - 28px),var(--max));
margin:auto;
}

.topbar{
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--line);
}

.topbar-inner{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 0;
}

.brand{
display:flex;
align-items:center;
gap:12px;
font-weight:700;
}

.brand-logo{
width:40px;
height:40px;
border-radius:12px;
object-fit:contain;
display:block;
}

.hero{
padding:40px 0 20px;
}

.hero h1{
font-size:40px;
margin:10px 0;
}

.hero p{
color:var(--muted);
max-width:600px;
}

.toolbar{
display:flex;
justify-content:space-between;
gap:20px;
margin-bottom:24px;
}

.apps-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.app-card{
background:white;
border-radius:18px;
padding:16px;
border:1px solid var(--line);
box-shadow:var(--shadow);
}

.app-top{
display:flex;
align-items:center;
gap:12px;
}

.logo-box{
width:52px;
height:52px;
border-radius:14px;
background:#f4f4f4;
display:grid;
place-items:center;
flex:0 0 auto;
}

.logo-box img{
width:32px;
height:32px;
object-fit:contain;
}

.app-info{
flex:1;
}

.app-name{
font-weight:600;
margin:0;
}

.app-sub{
font-size:14px;
color:var(--muted);
}

.store-icons{
display:flex;
gap:8px;
}

.store-icon{
width:34px;
height:34px;
border-radius:10px;
display:grid;
place-items:center;
border:1px solid var(--line);
background:white;
}

.store-icon svg{
width:18px;
height:18px;
}

  .store-icon.disabled{
  opacity:0.4;
  cursor:default;
  pointer-events:none;
}

.play svg{fill:#0a9d62}
.apple svg{fill:#111}

@media(max-width:900px){
.apps-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
.apps-grid{grid-template-columns:1fr}
}

</style>
</head>
